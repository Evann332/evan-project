<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: url('') no-repeat center center fixed; background-size: cover; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; cursor: pointer; }
        .card { background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 25px; width: 360px; text-align: center; border: 2px solid #d4af37; box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); }
        
        .avatar-wrapper { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; background: url('') center/cover; border: 4px solid #000; position: absolute; top: 5px; left: 5px; }
        .avatar-border { position: absolute; top: 0; left: 0; width: 130px; height: 130px; border-radius: 50%; border: 5px solid transparent; border-top: 5px solid #ff00de; border-bottom: 5px solid #00d4ff; animation: spin 2s linear infinite; }
        @keyframes spin { 0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);} }
        
        /* الاسم بألوان الطيف المتحركة */
        .name-ar, .name-en { font-weight: 900; background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3); background-size: 300% 100%; background-clip: text; -webkit-background-clip: text; color: transparent; animation: rainbowAnim 4s infinite linear; }
        .name-ar { font-size: 32px; margin: 0; }
        .name-en { font-size: 24px; margin-bottom: 10px; }
        @keyframes rainbowAnim { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
        
        .sub-text { color: #00d4ff; font-size: 15px; font-weight: bold; margin-bottom: 5px; }
        .extra-text { color: #aaa; font-size: 13px; font-style: italic; margin-bottom: 25px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #d4af37; color: white; border-radius: 10px; text-align: center; }
        .btn-glow { padding: 14px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; margin: 8px 0; width: 100%; background-size: 200% 100%; animation: moveGradient 3s infinite linear, pulse 2s infinite; }
        @keyframes moveGradient { 0% {background-position: 0% 50%;} 100% {background-position: 200% 50%;} }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.03);} 100% {transform: scale(1);} }
    </style>
</head>
<body onclick="playVoice()">

<div class="card">
    <div class="avatar-wrapper">
        <div class="avatar-border"></div>
        <div class="avatar"></div>
    </div>
    
    <div class="name-ar">إيفان مهند</div>
    <div class="name-en">Evan Muhannad</div>
    
    <div class="sub-text">الأفضل في عالم فتح الأشاير باحترافية</div>
    <div class="extra-text">قوة، سرعة، أمان - المطور: إيفان مهند</div>
    
    <input type="text" id="user" placeholder="اسم المستخدم / Username">
    <input type="password" id="pass" placeholder="كلمة المرور / Password">
    
    <button class="btn-glow" style="background: linear-gradient(90deg, #d4af37, #f1c40f, #d4af37); color: black;" onclick="login()">تسجيل الدخول / Login</button>
    <button class="btn-glow" style="background: linear-gradient(90deg, #007bff, #00d4ff, #007bff);" onclick="copyID()">نسخ آيدي الجهاز للتفعيل / Copy ID</button>
    <button class="btn-glow" style="background: linear-gradient(90deg, #8e44ad, #c0392b, #8e44ad);" onclick="window.open('https://t.me/YOUR_TELEGRAM_LINK')">الاشتراك والأسعار / Subscription</button>
    <button class="btn-glow" style="background: linear-gradient(90deg, #28a745, #00ff88, #28a745);" onclick="startTrial()">تجربة مجانية 24 ساعة / Free 24h Trial</button>
</div>

<script>
    function playVoice() {
        const msg = new SpeechSynthesisUtterance("إيفان مهند معكم، لا خوف عليكم");
        msg.lang = 'ar-SA';
        window.speechSynthesis.speak(msg);
    }

    let deviceID = localStorage.getItem('myDeviceID') || 'EVAN-' + Math.random().toString(36).substr(2, 9).toUpperCase();
    localStorage.setItem('myDeviceID', deviceID);
    const GIST_URL = "رابط_ملف_الـ_RAW_من_الجيت_هاب_هنا";

    async function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        try {
            const res = await fetch(GIST_URL);
            const data = await res.json();
            if (data[u] && data[u].pass === p) {
                if (new Date().getTime() < new Date(data[u].expiry).getTime()) {
                    alert("تم الدخول.. إيفان مهند يرحب بك!");
                } else {
                    alert("اشتراكك منتهي، تواصل مع المطور!");
                }
            } else {
                alert("بيانات خاطئة!");
            }
        } catch(e) { alert("خطأ في الاتصال بالسيرفر"); }
    }

    function startTrial() {
        if(localStorage.getItem('trialUsed')) { alert("لقد استنفدت الفترة المجانية!"); return; }
        localStorage.setItem('trialUsed', 'true');
        alert("تم تفعيل التجربة 24 ساعة!");
    }

    function copyID() {
        navigator.clipboard.writeText(deviceID);
        alert("تم نسخ الآيدي: " + deviceID);
    }
</script>
</body>
</html>
