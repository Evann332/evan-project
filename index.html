<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إيفان مهند - تطبيقات الأشاير</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; cursor: pointer; }
        .card { background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 25px; width: 360px; text-align: center; border: 2px solid #d4af37; box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); }
        .name-ar { font-size: 32px; font-weight: 900; color: #d4af37; margin: 0; }
        .name-en { font-size: 24px; color: #fff; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #d4af37; color: white; border-radius: 10px; text-align: center; }
        .btn-glow { padding: 14px; border: none; border-radius: 12px; color: black; font-weight: bold; cursor: pointer; margin: 8px 0; width: 100%; background: linear-gradient(90deg, #d4af37, #f1c40f, #d4af37); }
    </style>
</head>
<body>
<div class="card">
    <div class="name-ar">إيفان مهند</div>
    <div class="name-en">Evan Muhannad</div>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button class="btn-glow" onclick="login()">تسجيل الدخول</button>
</div>
<script>
    function login() { alert("جاري الاتصال بسيرفر إيفان.."); }
</script>
</body>
</html>
